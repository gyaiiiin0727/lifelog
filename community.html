<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
:root {
  --black: #111;
  --white: #fff;
  --blue: #2196F3;
  --blue-dark: #1976D2;
  --gray-50: #f8f9fa;
  --gray-100: #f0f0f0;
  --gray-200: #e5e7eb;
  --gray-400: #999;
  --gray-600: #666;
  --green: #27ae60;
  --red: #e74c3c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; background: var(--gray-50); color: var(--black); -webkit-font-smoothing: antialiased; min-height: 100vh; }
.hidden { display: none !important; }
.cm-header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--gray-100); padding: 10px 16px; padding-top: max(env(safe-area-inset-top, 10px), 10px); }
.cm-header-inner { max-width: 640px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.cm-logo { display: flex; align-items: center; gap: 6px; text-decoration: none; color: var(--black); }
.cm-logo img { width: 28px; height: 28px; border-radius: 6px; }
.cm-logo span { font-size: 18px; font-weight: 800; }
.cm-logo small { font-size: 10px; color: var(--gray-400); margin-left: 2px; }
.cm-header-user { display: flex; align-items: center; gap: 10px; }
.cm-header-link { font-size: 12px; color: var(--blue); text-decoration: none; }
.cm-avatar-sm { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0; }
.cm-tabs { display: flex; gap: 0; background: var(--gray-100); border-radius: 10px; padding: 3px; max-width: 300px; margin: 8px auto 0; }
.cm-tab { flex: 1; padding: 7px 0; border: none; border-radius: 8px; background: transparent; font-size: 13px; font-weight: 600; color: var(--gray-600); cursor: pointer; transition: all 0.2s; }
.cm-tab.active { background: var(--black); color: var(--white); }
.cm-container { max-width: 640px; margin: 0 auto; padding: 16px; }
.cm-section-title { font-size: 16px; font-weight: 700; margin: 20px 0 12px; }
.cm-section-title:first-child { margin-top: 0; }
.cm-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.cm-featured { display: flex; gap: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; scroll-snap-type: x mandatory; }
.cm-featured::-webkit-scrollbar { display: none; }
.cm-featured-card { flex: 0 0 280px; scroll-snap-align: start; background: var(--white); border: 1px solid var(--gray-200); border-radius: 14px; padding: 16px; cursor: pointer; transition: border-color 0.2s; }
.cm-featured-card:hover { border-color: var(--blue); }
.cm-featured-tag { display: inline-block; font-size: 11px; font-weight: 600; color: var(--blue); background: #e3f2fd; padding: 2px 8px; border-radius: 6px; margin-bottom: 8px; }
.cm-featured-title { font-size: 15px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; }
.cm-featured-excerpt { font-size: 13px; color: var(--gray-600); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.cm-featured-meta { font-size: 11px; color: var(--gray-400); margin-top: 8px; }
.cm-cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.cm-cat-card { background: var(--white); border: 1.5px solid var(--gray-200); border-radius: 14px; padding: 16px 12px; text-align: center; cursor: pointer; transition: all 0.2s; }
.cm-cat-card:hover { border-color: var(--blue); background: #f0f7ff; }
.cm-cat-emoji { font-size: 28px; display: block; margin-bottom: 6px; }
.cm-cat-label { font-size: 14px; font-weight: 700; color: var(--black); }
.cm-thread-item { background: var(--white); border: 1px solid var(--gray-200); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.2s; }
.cm-thread-item:hover { border-color: var(--blue); }
.cm-thread-title { font-size: 15px; font-weight: 700; line-height: 1.4; margin-bottom: 4px; }
.cm-thread-meta { font-size: 12px; color: var(--gray-400); display: flex; gap: 12px; align-items: center; }
.cm-thread-op { background: var(--white); border: 1px solid var(--gray-200); border-radius: 14px; padding: 20px 16px; margin-bottom: 16px; }
.cm-thread-op-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; line-height: 1.4; }
.cm-thread-op-body { font-size: 14px; line-height: 1.8; white-space: pre-wrap; }
.cm-author-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.cm-author-name { font-size: 13px; font-weight: 600; }
.cm-article-body { font-size: 15px; line-height: 1.9; white-space: pre-wrap; }
.cm-comments-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
.cm-comment { padding: 10px 0; border-bottom: 1px solid var(--gray-100); }
.cm-comment:last-child { border-bottom: none; }
.cm-comment-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.cm-comment-nick { font-size: 12px; font-weight: 600; }
.cm-comment-time { font-size: 11px; color: var(--gray-400); }
.cm-comment-body { font-size: 13px; line-height: 1.6; }
.cm-comment-del { font-size: 11px; color: var(--gray-400); cursor: pointer; margin-left: auto; }
.cm-comment-del:hover { color: var(--red); }
.cm-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 15px; outline: none; font-family: inherit; }
.cm-input:focus { border-color: var(--blue); }
.cm-textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 15px; outline: none; font-family: inherit; resize: vertical; min-height: 80px; }
.cm-textarea:focus { border-color: var(--blue); }
.cm-btn { display: inline-block; padding: 10px 20px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.cm-btn-primary { background: var(--blue); color: var(--white); }
.cm-btn-primary:hover { background: var(--blue-dark); }
.cm-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.cm-btn-outline { background: transparent; border: 1.5px solid var(--gray-200); color: var(--gray-600); }
.cm-btn-outline:hover { border-color: var(--blue); color: var(--blue); }
.cm-btn-sm { padding: 6px 14px; font-size: 13px; }
.cm-form-group { margin-bottom: 14px; }
.cm-form-label { font-size: 13px; font-weight: 600; color: var(--gray-600); margin-bottom: 6px; display: block; }
.cm-char-count { font-size: 11px; color: var(--gray-400); text-align: right; margin-top: 4px; }
.cm-reply-form { display: flex; gap: 8px; margin-top: 12px; }
.cm-reply-form .cm-input { flex: 1; padding: 10px 12px; font-size: 14px; }
.cm-tag { display: inline-block; font-size: 11px; color: var(--blue); background: #e3f2fd; padding: 2px 8px; border-radius: 6px; margin-right: 4px; }
.cm-filter-pills { display: flex; gap: 8px; flex-wrap: wrap; }
.cm-filter-pill { padding: 6px 14px; border: 1.5px solid var(--gray-200); border-radius: 20px; background: var(--white); font-size: 13px; font-weight: 600; color: var(--gray-600); cursor: pointer; transition: all 0.2s; }
.cm-filter-pill.active { border-color: var(--blue); color: var(--blue); background: #e3f2fd; }
.cm-back { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; color: var(--gray-600); cursor: pointer; margin-bottom: 12px; background: none; border: none; font-family: inherit; }
.cm-back:hover { color: var(--blue); }
.cm-login-prompt { background: #e3f2fd; border-radius: 12px; padding: 16px; text-align: center; font-size: 14px; color: var(--blue-dark); margin-top: 12px; }
.cm-login-prompt a { color: var(--blue); font-weight: 600; }
.cm-cta { background: linear-gradient(135deg, #2196F3 0%, #1565C0 100%); border-radius: 14px; padding: 24px 20px; text-align: center; color: #fff; margin: 20px 0; }
.cm-cta h3 { font-size: 16px; margin-bottom: 6px; }
.cm-cta p { font-size: 13px; opacity: 0.9; margin-bottom: 12px; }
.cm-cta a { display: inline-block; background: #fff; color: var(--blue); padding: 10px 24px; border-radius: 10px; font-weight: 700; font-size: 14px; text-decoration: none; }
.cm-empty { text-align: center; padding: 40px 16px; color: var(--gray-400); }
.cm-empty-icon { font-size: 40px; margin-bottom: 8px; }
.cm-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--black); color: var(--white); padding: 12px 24px; border-radius: 24px; font-size: 14px; z-index: 99999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.cm-toast.show { opacity: 1; }
.cm-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 16px; }
.cm-modal { background: var(--white); border-radius: 16px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; padding: 24px 20px; }
.cm-modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.cm-modal-close { float: right; font-size: 24px; cursor: pointer; color: var(--gray-400); background: none; border: none; line-height: 1; }
.cm-loading { text-align: center; padding: 32px; color: var(--gray-400); }
.cm-footer { text-align: center; padding: 24px 16px; font-size: 12px; color: var(--gray-400); }
.cm-article-body.cm-rich { white-space: normal; }
.cm-article-body.cm-rich img { max-width: 100%; border-radius: 12px; margin: 16px 0; display: block; }
.cm-article-body.cm-rich h3 { font-size: 17px; font-weight: 700; margin: 24px 0 8px; line-height: 1.4; }
.cm-article-body.cm-rich p { margin: 12px 0; line-height: 1.9; }
.cm-article-body.cm-rich ul { margin: 12px 0; padding-left: 24px; }
.cm-article-body.cm-rich li { margin: 6px 0; line-height: 1.7; }
.cm-article-body.cm-rich blockquote { border-left: 3px solid var(--blue); padding: 8px 12px; color: var(--gray-600); margin: 16px 0; background: var(--gray-50); border-radius: 0 8px 8px 0; font-style: italic; }
.cm-article-body.cm-rich a { color: var(--blue); text-decoration: underline; }
.cm-article-body.cm-rich strong { font-weight: 700; }
.cm-article-body.cm-rich .cm-article-cta { background: linear-gradient(135deg, #2196F3 0%, #1565C0 100%); border-radius: 14px; padding: 24px 20px; text-align: center; color: #fff; margin: 24px 0 8px; }
.cm-article-body.cm-rich .cm-article-cta h3 { color: #fff; margin: 0 0 6px; font-size: 16px; }
.cm-article-body.cm-rich .cm-article-cta p { color: rgba(255,255,255,0.9); font-size: 13px; margin: 0 0 12px; }
.cm-article-body.cm-rich .cm-article-cta a { display: inline-block; background: #fff; color: var(--blue); padding: 10px 24px; border-radius: 10px; font-weight: 700; font-size: 14px; text-decoration: none; }
/* --- 音声記事テンプレート --- */
.cm-tpl-item { background: var(--gray-50); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.cm-tpl-label { font-size: 14px; font-weight: 700; margin-bottom: 6px; color: var(--black); }
.cm-tpl-hint { font-size: 12px; color: var(--gray-400); margin-bottom: 8px; }
.cm-tpl-row { display: flex; gap: 8px; align-items: flex-start; }
.cm-tpl-row textarea { flex: 1; min-height: 60px; resize: vertical; border: 1px solid var(--gray-200); border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; line-height: 1.6; }
.cm-voice-btn { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; background: var(--blue); color: #fff; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; flex-shrink: 0; }
.cm-voice-btn:active { transform: scale(0.95); }
.cm-voice-btn.recording { background: #ef4444; animation: cm-pulse 1.2s infinite; }

.cm-draft-loading { text-align: center; padding: 24px; color: var(--gray-400); }
.cm-draft-loading .cm-spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--gray-200); border-top-color: var(--blue); border-radius: 50%; animation: cm-spin 0.8s linear infinite; margin-bottom: 8px; }
@keyframes cm-spin { to { transform: rotate(360deg); } }
.cm-preview-section { margin-bottom: 16px; }
.cm-preview-section label { font-size: 13px; font-weight: 700; color: var(--gray-600); display: block; margin-bottom: 4px; }
.cm-preview-images { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.cm-preview-images .cm-img-wrap { position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden; }
.cm-preview-images .cm-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.cm-preview-images .cm-img-del { position: absolute; top: 2px; right: 2px; width: 22px; height: 22px; background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.cm-add-photo-btn { display: inline-flex; align-items: center; gap: 4px; padding: 8px 14px; background: var(--gray-50); border: 1px dashed var(--gray-200); border-radius: 8px; font-size: 13px; color: var(--gray-600); cursor: pointer; }
.cm-article-body .cm-user-images { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
.cm-article-body .cm-user-images img { max-width: 100%; border-radius: 10px; }
</style>
</head>
<body>
<header class="cm-header">
  <div class="cm-header-inner">
    <a href="./lp.html" class="cm-logo"><img src="./icon.jpg" alt="Dayce" width="28" height="28"><span>ayce</span><small>Community</small></a>
    <div class="cm-header-user" id="headerUser"><a href="./index.html" class="cm-header-link">ログイン</a></div>
  </div>
  <div class="cm-tabs" id="mainTabs">
    <button class="cm-tab active" onclick="switchTab('home')" data-tab="home">ホーム</button>
    <button class="cm-tab" onclick="switchTab('articles')" data-tab="articles">記事</button>
    <button class="cm-tab" onclick="switchTab('forum')" data-tab="forum">交流</button>
  </div>
</header>
<main class="cm-container">
<section id="tabHome">
  <h3 class="cm-section-title">📝 注目の記事</h3>
  <div class="cm-featured" id="homeFeatured"><div class="cm-loading">読み込み中...</div></div>
  <h3 class="cm-section-title">💬 最新の交流</h3>
  <div id="homeRecent"><div class="cm-loading">読み込み中...</div></div>
  <div id="homeCta" class="cm-cta hidden">
    <h3>Dayceで毎日を記録しよう</h3>
    <p>声で日記を書いて、AIがあなたの気づきを整理します</p>
    <a href="./index.html">アプリを始める →</a>
  </div>
</section>
<section id="tabArticles" class="hidden">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <div class="cm-filter-pills" id="articleFilters">
      <button class="cm-filter-pill active" onclick="filterArticles('all')">すべて</button>
      <button class="cm-filter-pill" onclick="filterArticles('admin')">📌 運営</button>
      <button class="cm-filter-pill" onclick="filterArticles('user')">✏️ ユーザー</button>
    </div>
    <button class="cm-btn cm-btn-primary cm-btn-sm hidden" id="writeArticleBtn" onclick="showNewArticleModal()">✏️ 記事を書く</button>
  </div>
  <div id="articleList"></div>
  <div id="articleDetail" class="hidden"></div>
  <button class="cm-btn cm-btn-outline hidden" id="articleLoadMore" onclick="loadArticles(false)" style="width:100%;margin-top:8px;">もっと読む</button>
</section>
<section id="tabForum" class="hidden">
  <div id="forumCategories">
    <h3 class="cm-section-title">🎯 目標カテゴリ</h3>
    <div class="cm-cat-grid" id="goalCats"></div>
    <h3 class="cm-section-title">💭 用途カテゴリ</h3>
    <div class="cm-cat-grid" id="purposeCats"></div>
  </div>
  <div id="forumThreads" class="hidden">
    <button class="cm-back" onclick="showForumCategories()">← カテゴリ一覧</button>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h3 class="cm-section-title" id="threadListTitle" style="margin:0;"></h3>
      <button class="cm-btn cm-btn-primary cm-btn-sm hidden" id="newThreadBtn" onclick="showNewThreadModal()">＋ 新規スレッド</button>
    </div>
    <div id="threadList"></div>
    <button class="cm-btn cm-btn-outline hidden" id="threadLoadMore" onclick="loadThreads(false)" style="width:100%;margin-top:8px;">もっと読む</button>
  </div>
  <div id="forumThread" class="hidden">
    <button class="cm-back" id="threadBackBtn" onclick="backToThreads()">← スレッド一覧</button>
    <div id="threadDetail"></div>
  </div>
</section>
</main>
<div class="cm-toast" id="toast"></div>
<footer class="cm-footer">&copy; 2025 Dayce Community</footer>

function stripHtml(h){return String(h||'').replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim();}
var currentUser=null,activeTab='home',articleFilter='all',articleCursor=null,currentCategory=null,threadCursor=null,currentThreadId=null;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function timeAgo(iso){var d=Date.now()-new Date(iso).getTime();if(d<60000)return'たった今';if(d<3600000)return Math.floor(d/60000)+'分前';if(d<86400000)return Math.floor(d/3600000)+'時間前';return Math.floor(d/86400000)+'日前';}
function avatarColor(e){var h=0;for(var i=0;i<(e||'').length;i++)h=((h<<5)-h)+e.charCodeAt(i);return COLORS[Math.abs(h)%COLORS.length];}
function avatarHTML(n,e,s){s=s||30;return'<div class="cm-avatar-sm" style="width:'+s+'px;height:'+s+'px;background:'+avatarColor(e)+';font-size:'+(s*0.43)+'px;">'+esc((n||'?')[0])+'</div>';}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function truncate(s,n){return s&&s.length>n?s.slice(0,n)+'...':s;}
async function apiFetch(p,o){o=o||{};var h={'Content-Type':'application/json'};var tk=localStorage.getItem('syncAuthToken');if(tk)h['Authorization']='Bearer '+tk;var fo={method:o.method||'GET',headers:h};if(o.body)fo.body=JSON.stringify(o.body);var r=await fetch(API+p,fo);var d=await r.json();if(!r.ok)throw new Error(d.error||'Error');return d;}
function requireLogin(){if(currentUser){if(!currentUser.nickname){showNicknameModal();return false;}return true;}showToast('投稿するにはDayceアプリからログインしてください');return false;}

async function initUser(){var tk=localStorage.getItem('syncAuthToken'),em=localStorage.getItem('syncAuthEmail');if(!tk||!em){currentUser=null;updateAuthUI();return;}try{var d=await apiFetch('/api/community/me');currentUser={email:d.email||em,nickname:d.nickname,isAdmin:d.isAdmin||false};}catch(e){currentUser=null;}updateAuthUI();}

async function loadHome(){var fe=document.getElementById('homeFeatured'),re=document.getElementById('homeRecent');fe.innerHTML='<div class="cm-loading">読み込み中...</div>';re.innerHTML='<div class="cm-loading">読み込み中...</div>';try{var ar={articles:[]},pr={posts:[]};try{var res=await Promise.all([apiFetch('/api/community/articles?limit=5'),apiFetch('/api/community/posts?limit=5')]);ar=res[0];pr=res[1];}catch(e){}var allArticles=BUILTIN_ARTICLES.concat(ar.articles||[]).slice(0,5);if(allArticles.length>0){fe.innerHTML=allArticles.map(function(a){var excerpt=a.isBuiltin?truncate(stripHtml(a.body),80):truncate(a.body,80);return'<div class="cm-featured-card" onclick="switchTab(\'articles\');showArticleDetail(\''+esc(a.id)+'\')">'+'<div class="cm-featured-tag">'+(a.type==='admin'?'📌 運営':'✏️ ユーザー')+'</div>'+'<div class="cm-featured-title">'+esc(a.title)+'</div>'+'<div class="cm-featured-excerpt">'+esc(excerpt)+'</div>'+'<div class="cm-featured-meta">'+esc(a.nickname)+' · '+timeAgo(a.createdAt)+'</div></div>';}).join('');}else{fe.innerHTML='<div class="cm-empty" style="padding:20px;"><div class="cm-empty-icon">📝</div>まだ記事がありません</div>';}if(pr.posts&&pr.posts.length>0){re.innerHTML=pr.posts.map(function(p){var ci=catInfo(p.category);var t=p.title||truncate(p.body,40);return'<div class="cm-thread-item" onclick="switchTab(\'forum\');openThreadDirect(\''+esc(p.id)+'\',\''+esc(p.category||'chat')+'\')">'+'<div class="cm-thread-title">'+ci.emoji+' '+esc(t)+'</div>'+'<div class="cm-thread-meta"><span>'+esc(p.nickname)+'</span><span>💬 '+(p.commentCount||0)+'</span><span>'+timeAgo(p.lastActivity||p.createdAt)+'</span></div></div>';}).join('');}else{re.innerHTML='<div class="cm-empty" style="padding:20px;"><div class="cm-empty-icon">💬</div>まだ投稿がありません</div>';}}catch(e){fe.innerHTML=BUILTIN_ARTICLES.length>0?BUILTIN_ARTICLES.map(function(a){var excerpt=truncate(stripHtml(a.body),80);return'<div class="cm-featured-card" onclick="switchTab(\'articles\');showArticleDetail(\''+esc(a.id)+'\')">'+' async function showArticleDetail(id){var le=document.getElementById('articleList'),de=document.getElementById('articleDetail');le.classList.add('hidden');de.classList.remove('hidden');document.getElementById('articleLoadMore').classList.add('hidden');de.innerHTML='<div class="cm-loading">読み込み中...</div>';var builtin=null;for(var i=0;i<BUILTIN_ARTICLES.length;i++){if(BUILTIN_ARTICLES[i].id===id){builtin=BUILTIN_ARTICLES[i];break;}}try{var a,comments=[];if(builtin){a=builtin;comments=[];}else{var[ar,cr]=await Promise.all([apiFetch('/api/community/articles/'+id),apiFetch('/api/community/articles/'+id+'/comments')]);a=ar.article;comments=cr.comments||[];}var h='<button class="cm-back" onclick="showArticleList();loadArticles(true);">← 記事一覧</button><div class="cm-card">';h+='<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;"><span class="cm-tag">'+(a.type==='admin'?'📌 運営':'✏️ ユーザー')+'</span>';(a.tags||[]).forEach(function(t){h+='<span class="cm-tag">'+esc(t)+'</span>';});h+='</div><h2 style="font-size:20px;font-weight:800;line-height:1.4;margin-bottom:10px;">'+esc(a.title)+'</h2>';h+='<div class="cm-author-row">'+avatarHTML(a.nickname,a.author,28)+'<span class="cm-author-name">'+esc(a.nickname)+'</span><span style="font-size:12px;color:var(--gray-400);">'+timeAgo(a.createdAt)+'</span></div>';if(a.isBuiltin){h+='<div class="cm-article-body cm-rich">'+a.body+'</div>';}else{h+='<div class="cm-article-body">'+esc(a.body);if(a.images&&a.images.length>0){h+='<div class="cm-user-images">';a.images.forEach(function(src){h+='<img src="'+esc(src)+'" loading="lazy">';});h+='</div>';}h+='</div>';if(currentUser&&(currentUser.email===a.author||currentUser.isAdmin)){h+='<div style="margin-top:16px;text-align:right;"><button class="cm-btn cm-btn-outline cm-btn-sm" style="color:var(--red);border-color:var(--red);" onclick="deleteArticle(\''+esc(a.id)+'\')">🗑 削除</button></div>';}}h+='</div>';if(!a.isBuiltin){h+='<div class="cm-card" style="margin-top:12px;"><div class="cm-comments-title">💬 コメント ('+comments.length+')</div>';h+=renderComments(comments,a.id);if(currentUser){h+='<div class="cm-reply-form"><input class="cm-input" id="articleCommentInput" placeholder="コメントを書く..." maxlength="300"><button class="cm-btn cm-btn-primary cm-btn-sm" onclick="postComment(\''+esc(a.id)+'\',\'articleCommentInput\')">送信</button></div>';}else{h+='<div class="cm-login-prompt"><a href="./index.html">Dayceアプリからログイン</a>してコメントしよう</div>';}h+='</div>';}de.innerHTML=h;}catch(e){de.innerHTML='<button class="cm-back" onclick="showArticleList();loadArticles(true);">← 戻る</button><div class="cm-empty">記事を読み込めませんでした</div>';}}

function openCategory(catId){currentCategory=catId;threadCursor=null;document.getElementById('forumCategories').classList.add('hidden');document.getElementById('forumThreads').classList.remove('hidden');document.getElementById('forumThread').classList.add('hidden');var ci=catInfo(catId);document.getElementById('threadListTitle').textContent=ci.emoji+' '+ci.label;document.getElementById('newThreadBtn').classList.toggle('hidden',!currentUser);loadThreads(true);}
async function loadThreads(reset){if(reset)threadCursor=null;var el=document.getElementById('threadList');if(reset)el.innerHTML='<div class="cm-loading">読み込み中...</div>';try{var q='/api/community/posts?limit=20&category='+currentCategory;if(threadCursor)q+='&cursor='+threadCursor;var d=await apiFetch(q);if(reset)el.innerHTML='';if(d.posts.length===0&&reset){el.innerHTML='<div class="cm-empty"><div class="cm-empty-icon">💬</div>まだスレッドがありません<br>最初のスレッドを作成しよう！</div>';}d.posts.forEach(function(p){var t=p.title||truncate(p.body,50);el.innerHTML+='<div class="cm-thread-item" onclick="openThread(\''+esc(p.id)+'\')">'+'<div class="cm-thread-title">'+esc(t)+'</div>'+'<div class="cm-thread-meta"><span>'+esc(p.nickname)+'</span><span>💬 '+(p.commentCount||0)+'</span><span>'+timeAgo(p.lastActivity||p.createdAt)+'</span></div></div>';});threadCursor=d.nextCursor;document.getElementById('threadLoadMore').classList.toggle('hidden',!d.hasMore);}catch(e){if(reset)el.innerHTML='<div class="cm-empty">読み込みに失敗しました</div>';}}

async function openThread(tid){currentThreadId=tid;document.getElementById('forumThreads').classList.add('hidden');document.getElementById('forumThread').classList.remove('hidden');var de=document.getElementById('threadDetail');de.innerHTML='<div class="cm-loading">読み込み中...</div>';try{var[pr,cr]=await Promise.all([apiFetch('/api/community/posts?limit=50'+(currentCategory?'&category='+currentCategory:'')),apiFetch('/api/community/posts/'+tid+'/comments')]);var th=null;for(var i=0;i<pr.posts.length;i++){if(pr.posts[i].id===tid){th=pr.posts[i];break;}}if(!th){de.innerHTML='<div class="cm-empty">スレッドが見つかりません</div>';return;}var ci=catInfo(th.category);var t=th.title||truncate(th.body,50);var h='<div class="cm-thread-op"><span class="cm-tag">'+ci.emoji+' '+ci.label+'</span><div class="cm-thread-op-title">'+esc(t)+'</div><div class="cm-author-row">'+avatarHTML(th.nickname,th.author,28)+'<span class="cm-author-name">'+esc(th.nickname)+'</span><span style="font-size:12px;color:var(--gray-400);">'+timeAgo(th.createdAt)+'</span></div><div class="cm-thread-op-body">'+esc(th.body)+'</div>';if(currentUser&&(currentUser.email===th.author||currentUser.isAdmin)){h+='<div style="margin-top:12px;text-align:right;"><button class="cm-btn cm-btn-outline cm-btn-sm" style="color:var(--red);border-color:var(--red);" onclick="deleteThread(\''+esc(th.id)+'\')">🗑 削除</button></div>';}h+='</div><div class="cm-card"><div class="cm-comments-title">💬 返信 ('+(cr.comments||[]).length+')</div>';h+=renderComments(cr.comments||[],tid);if(currentUser){h+='<div class="cm-reply-form"><input class="cm-input" id="threadCommentInput" placeholder="返信を書く..." maxlength="300"><button class="cm-btn cm-btn-primary cm-btn-sm" onclick="postComment(\''+esc(tid)+'\',\'threadCommentInput\')">送信</button></div>';}else{h+='<div class="cm-login-prompt"><a href="./index.html">Dayceアプリからログイン</a>して返信しよう</div>';}h+='</div>';de.innerHTML=h;}catch(e){de.innerHTML='<div class="cm-empty">読み込みに失敗しました</div>';}}
function openThreadDirect(tid,cat){currentCategory=cat||'chat';currentThreadId=tid;document.getElementById('forumCategories').classList.add('hidden');document.getElementById('forumThreads').classList.add('hidden');document.getElementById('forumThread').classList.remove('hidden');document.getElementById('threadBackBtn').onclick=function(){openCategory(currentCategory);};openThread(tid);}
function backToThreads(){document.getElementById('forumThread').classList.add('hidden');document.getElementById('forumThreads').classList.remove('hidden');}
async function deleteThread(id){if(!confirm('このスレッドを削除しますか？'))return;try{await apiFetch('/api/community/posts/delete',{method:'POST',body:{postId:id}});showToast('スレッドを削除しました');if(currentCategory)openCategory(currentCategory);else showForumCategories();}catch(e){showToast('エラー: '+e.message);}}

function renderComments(comments,targetId){if(!comments||comments.length===0)return'<div style="padding:8px 0;color:var(--gray-400);font-size:13px;">まだコメントはありません</div>';return comments.map(function(c){var cd=currentUser&&(currentUser.email===c.author||currentUser.isAdmin);return'<div class="cm-comment"><div class="cm-comment-header">'+avatarHTML(c.nickname,c.author,22)+'<span class="cm-comment-nick">'+esc(c.nickname)+'</span><span class="cm-comment-time">'+timeAgo(c.createdAt)+'</span>'+(cd?'<span class="cm-comment-del" onclick="deleteComment(\''+esc(targetId)+'\',\''+esc(c.id)+'\')">削除</span>':'')+'</div><div class="cm-comment-body">'+esc(c.body)+'</div></div>';}).join('');}
async function postComment(tid,iid){if(!requireLogin())return;var inp=document.getElementById(iid);var t=inp?inp.value.trim():'';if(!t)return;try{var ep=tid.startsWith('a_')?'/api/community/articles/'+tid+'/comments':'/api/community/posts/'+tid+'/comments';await apiFetch(ep,{method:'POST',body:{body:t}});inp.value='';showToast('コメントしました');if(tid.startsWith('a_'))showArticleDetail(tid);else openThread(tid);}catch(e){showToast('エラー: '+e.message);}}
async function deleteComment(tid,cid){if(!confirm('このコメントを削除しますか？'))return;try{await apiFetch('/api/community/comments/delete',{method:'POST',body:{targetId:tid,commentId:cid}});showToast('コメントを削除しました');if(tid.startsWith('a_'))showArticleDetail(tid);else openThread(tid);}catch(e){showToast('エラー: '+e.message);}}

/* --- テンプレート音声記事作成 --- */
var cmTplFields=[
  {key:'trigger',label:'きっかけ',hint:'Dayceを使い始めたきっかけや、興味を持った理由は？'},
  {key:'problem',label:'以前の悩み',hint:'以前はどんな悩みや困りごとがありましたか？'},
  {key:'usage',label:'使い方',hint:'普段どんな風にDayceを使っていますか？'},
  {key:'change',label:'変化',hint:'使い始めてどんな変化がありましたか？'},
  {key:'recommend',label:'おすすめ',hint:'おすすめポイントや、こんな人に勧めたい等'}
];
var cmVoiceRec=null,cmVoiceTarget=null;
var cmDraftImages=[];
function showNewArticleModal(){
  if(!requireLogin())return;
  if(cmVoiceRec){try{cmVoiceRec.stop();}catch(e){}}cmVoiceRec=null;cmVoiceTarget=null;cmDraftImages=[];
  var o=document.createElement('div');o.className='cm-modal-overlay';o.id='articleModal';o.onclick=function(e){if(e.target===o)o.remove();};
  var fieldsHtml=cmTplFields.map(function(f){
    return '<div class="cm-tpl-item"><div class="cm-tpl-label">'+f.label+'</div><div class="cm-tpl-hint">'+f.hint+'</div><div class="cm-tpl-row"><textarea id="cmTpl_'+f.key+'" placeholder="音声またはキーボードで入力..."></textarea><button type="button" class="cm-voice-btn" id="cmVoice_'+f.key+'" onclick="toggleCmVoice(\''+f.key+'\')">🎤</button></div></div>';
  }).join('');
  fieldsHtml+='<div class="cm-tpl-item"><div class="cm-tpl-label">自由メモ</div><div class="cm-tpl-hint">上の項目に当てはまらないこと、何でも自由に</div><div class="cm-tpl-row"><textarea id="cmTpl_free" placeholder="音声またはキーボードで入力..."></textarea><button type="button" class="cm-voice-btn" id="cmVoice_free" onclick="toggleCmVoice(\'free\')">🎤</button></div></div>';
  o.innerHTML='<div class="cm-modal"><button class="cm-modal-close" onclick="closeCmArticleModal()">&times;</button><div class="cm-modal-title">🎤 声で記事を書く</div><p style="font-size:13px;color:var(--gray-600);margin-bottom:14px;">答えたい項目だけでOK。マイクボタンで音声入力できます。</p><div id="cmTplStep1">'+fieldsHtml+'<button class="cm-btn cm-btn-primary" style="width:100%;margin-top:8px;" onclick="generateArticleDraft()">✨ AIで記事にまとめる</button><div style="text-align:center;margin-top:10px;"><a href="#" onclick="showDirectArticleForm();return false;" style="font-size:13px;color:var(--gray-400);">直接書く</a></div></div><div id="cmTplStep2" class="hidden"></div></div>';
  document.body.appendChild(o);
}
function closeCmArticleModal(){if(cmVoiceRec){try{cmVoiceRec.stop();}catch(e){}}cmVoiceRec=null;cmVoiceTarget=null;var m=document.getElementById('articleModal');if(m)m.remove();}
function showDirectArticleForm(){
  var s1=document.getElementById('cmTplStep1'),s2=document.getElementById('cmTplStep2');s1.classList.add('hidden');s2.classList.remove('hidden');
  s2.innerHTML='<div class="cm-form-group"><label class="cm-form-label">タイトル</label><input class="cm-input" id="articleTitleInput" placeholder="記事のタイトル" maxlength="100"></div><div class="cm-form-group"><label class="cm-form-label">本文</label><textarea class="cm-textarea" id="articleBodyInput" placeholder="内容を書いてください..." maxlength="5000" rows="10"></textarea><div class="cm-char-count"><span id="articleCharCount">0</span> / 5000</div></div><div class="cm-form-group"><label class="cm-form-label">タグ（カンマ区切り、最大5個）</label><input class="cm-input" id="articleTagsInput" placeholder="例: ダイエット, 習慣化, コツ"></div><div class="cm-form-group"><label class="cm-form-label">写真（最大3枚）</label><div class="cm-preview-images" id="directImages"></div><button type="button" class="cm-add-photo-btn" onclick="addArticlePhoto(\'directImages\')">📷 写真を追加</button></div><button class="cm-btn cm-btn-primary" style="width:100%;" onclick="submitArticle()">投稿する</button><div style="text-align:center;margin-top:10px;"><a href="#" onclick="document.getElementById(\'cmTplStep1\').classList.remove(\'hidden\');document.getElementById(\'cmTplStep2\').classList.add(\'hidden\');return false;" style="font-size:13px;color:var(--gray-400);">← テンプレートに戻る</a></div>';
  document.getElementById('articleBodyInput').addEventListener('input',function(){document.getElementById('articleCharCount').textContent=this.value.length;});
}
/* --- 音声入力トグル --- */
function toggleCmVoice(key){
  var btn=document.getElementById('cmVoice_'+key),ta=document.getElementById('cmTpl_'+key);
  if(cmVoiceRec&&cmVoiceTarget===key){cmVoiceRec.stop();cmVoiceRec=null;cmVoiceTarget=null;btn.textContent='🎤';btn.classList.remove('recording');return;}
  if(cmVoiceRec){try{cmVoiceRec.stop();}catch(e){}var pb=document.getElementById('cmVoice_'+cmVoiceTarget);if(pb){pb.textContent='🎤';pb.classList.remove('recording');}cmVoiceRec=null;cmVoiceTarget=null;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('このブラウザは音声認識に対応していません');return;}
  cmVoiceRec=new SR();cmVoiceRec.lang='ja-JP';cmVoiceRec.continuous=true;cmVoiceRec.interimResults=true;cmVoiceTarget=key;
  var processed=new Set(),allText='';
  cmVoiceRec.onresult=function(e){var interim='';for(var i=0;i<e.results.length;i++){if(e.results[i].isFinal){var t=e.results[i][0].transcript;if(!processed.has(t)){processed.add(t);allText+=t;}}else{interim+=e.results[i][0].transcript;}}
    var base=ta.dataset.baseText||'';ta.value=base+(base?' ':'')+(allText||'')+interim;};
  cmVoiceRec.onerror=function(e){if(e.error==='not-allowed'){alert('マイクの使用が許可されていません');btn.textContent='🎤';btn.classList.remove('recording');cmVoiceRec=null;cmVoiceTarget=null;}};
  cmVoiceRec.onend=function(){if(cmVoiceTarget===key&&cmVoiceRec){var base=ta.dataset.baseText||'';if(allText)ta.dataset.baseText=(base+(base?' ':'')+allText).trim();allText='';processed.clear();setTimeout(function(){if(cmVoiceTarget===key&&cmVoiceRec){try{cmVoiceRec.start();}catch(e){}}},600);}};
  ta.dataset.baseText=ta.value;cmVoiceRec.start();btn.textContent='⏹️';btn.classList.add('recording');
}
/* --- AIで記事にまとめる --- */
async function generateArticleDraft(){
  var answers={};var hasAny=false;cmTplFields.concat([{key:'free'}]).forEach(function(f){var v=document.getElementById('cmTpl_'+f.key);if(v&&v.value.trim()){answers[f.key]=v.value.trim();hasAny=true;}});
  if(!hasAny){showToast('少なくとも1つの項目に入力してください');return;}
  if(cmVoiceRec){try{cmVoiceRec.stop();}catch(e){}cmVoiceRec=null;cmVoiceTarget=null;cmTplFields.concat([{key:'free'}]).forEach(function(f){var b=document.getElementById('cmVoice_'+f.key);if(b){b.textContent='🎤';b.classList.remove('recording');}});}
  var s1=document.getElementById('cmTplStep1'),s2=document.getElementById('cmTplStep2');s1.classList.add('hidden');s2.classList.remove('hidden');
  s2.innerHTML='<div class="cm-draft-loading"><div class="cm-spinner"></div><div>AIが記事をまとめています...</div></div>';
  try{
    var d=await apiFetch('/api/community/draft',{method:'POST',body:{answers:answers}});
    showArticlePreview(d.title||'',d.body||'',d.tags||[]);
  }catch(e){s2.innerHTML='<div class="cm-empty">エラー: '+esc(e.message)+'</div><button class="cm-btn cm-btn-outline" style="width:100%;margin-top:12px;" onclick="document.getElementById(\'cmTplStep1\').classList.remove(\'hidden\');document.getElementById(\'cmTplStep2\').classList.add(\'hidden\');">← 戻る</button>';}
}
function showArticlePreview(title,body,tags){
  var s2=document.getElementById('cmTplStep2');
  s2.innerHTML='<div style="font-size:15px;font-weight:700;margin-bottom:14px;">📝 プレビュー</div><div class="cm-preview-section"><label>タイトル</label><input class="cm-input" id="articleTitleInput" value="'+esc(title)+'" maxlength="100"></div><div class="cm-preview-section"><label>本文</label><textarea class="cm-textarea" id="articleBodyInput" rows="12" maxlength="5000">'+esc(body)+'</textarea><div class="cm-char-count"><span id="articleCharCount">'+body.length+'</span> / 5000</div></div><div class="cm-preview-section"><label>タグ</label><input class="cm-input" id="articleTagsInput" value="'+esc(tags.join(', '))+'" placeholder="カンマ区切り"></div><div class="cm-preview-section"><label>写真（最大3枚）</label><div class="cm-preview-images" id="previewImages"></div><button type="button" class="cm-add-photo-btn" onclick="addArticlePhoto(\'previewImages\')">📷 写真を追加</button></div><button class="cm-btn cm-btn-primary" style="width:100%;margin-top:8px;" onclick="submitArticle()">投稿する</button><div style="text-align:center;margin-top:10px;"><a href="#" onclick="document.getElementById(\'cmTplStep1\').classList.remove(\'hidden\');document.getElementById(\'cmTplStep2\').classList.add(\'hidden\');return false;" style="font-size:13px;color:var(--gray-400);">← テンプレートに戻る</a></div>';
  document.getElementById('articleBodyInput').addEventListener('input',function(){document.getElementById('articleCharCount').textContent=this.value.length;});
}
/* --- 写真添付 --- */
function addArticlePhoto(containerId){
  if(cmDraftImages.length>=3){showToast('写真は最大3枚まで');return;}
  var inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=function(e){var f=e.target.files[0];if(!f)return;resizeImage(f,800,0.7,function(dataUrl){cmDraftImages.push(dataUrl);renderPhotoPreview(containerId);});};
  inp.click();
}
function resizeImage(file,maxW,quality,cb){
  var reader=new FileReader();reader.onload=function(e){var img=new Image();img.onload=function(){var w=img.width,h=img.height;if(w>maxW){h=Math.round(h*(maxW/w));w=maxW;}var c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',quality));};img.src=e.target.result;};reader.readAsDataURL(file);
}
function renderPhotoPreview(containerId){
  var el=document.getElementById(containerId);if(!el)return;
  el.innerHTML=cmDraftImages.map(function(src,i){return'<div class="cm-img-wrap"><img src="'+src+'"><button class="cm-img-del" onclick="removeArticlePhoto('+i+',\''+containerId+'\')">&times;</button></div>';}).join('');
}
function removeArticlePhoto(idx,containerId){cmDraftImages.splice(idx,1);renderPhotoPreview(containerId);}
async function submitArticle(){var ti=document.getElementById('articleTitleInput').value.trim(),bo=document.getElementById('articleBodyInput').value.trim(),ts=document.getElementById('articleTagsInput').value.trim();var tags=ts?ts.split(',').map(function(t){return t.trim();}).filter(Boolean).slice(0,5):[];if(!ti){showToast('タイトルを入力してください');return;}if(!bo){showToast('本文を入力してください');return;}try{var payload={title:ti,body:bo,tags:tags};if(cmDraftImages&&cmDraftImages.length>0)payload.images=cmDraftImages;await apiFetch('/api/community/articles',{method:'POST',body:payload});closeCmArticleModal();showToast('記事を投稿しました！');loadArticles(true);}catch(e){showToast('エラー: '+e.message);}}

function showNewThreadModal(){if(!requireLogin())return;var ci=catInfo(currentCategory);var o=document.createElement('div');o.className='cm-modal-overlay';o.id='threadModal';o.onclick=function(e){if(e.target===o)o.remove();};var opts=ALL_CATS.map(function(c){return'<option value="'+c.id+'"'+(c.id===currentCategory?' selected':'')+'>'+c.emoji+' '+c.label+'</option>';}).join('');o.innerHTML='<div class="cm-modal"><button class="cm-modal-close" onclick="document.getElementById(\'threadModal\').remove()">&times;</button><div class="cm-modal-title">💬 新しいスレッド</div><div class="cm-form-group"><label class="cm-form-label">カテゴリ</label><select class="cm-input" id="threadCatInput">'+opts+'</select></div><div class="cm-form-group"><label class="cm-form-label">タイトル</label><input class="cm-input" id="threadTitleInput" placeholder="スレッドのタイトル" maxlength="100"></div><div class="cm-form-group"><label class="cm-form-label">本文</label><textarea class="cm-textarea" id="threadBodyInput" placeholder="内容を書いてください..." maxlength="2000" rows="6"></textarea><div class="cm-char-count"><span id="threadCharCount">0</span> / 2000</div></div><button class="cm-btn cm-btn-primary" style="width:100%;" onclick="submitThread()">投稿する</button></div>';document.body.appendChild(o);document.getElementById('threadBodyInput').addEventListener('input',function(){document.getElementById('threadCharCount').textContent=this.value.length;});}
async function submitThread(){var cat=document.getElementById('threadCatInput').value,ti=document.getElementById('threadTitleInput').value.trim(),bo=document.getElementById('threadBodyInput').value.trim();if(!ti){showToast('タイトルを入力してください');return;}if(!bo){showToast('本文を入力してください');return;}try{await apiFetch('/api/community/posts',{method:'POST',body:{title:ti,body:bo,category:cat}});document.getElementById('threadModal').remove();showToast('スレッドを作成しました！');currentCategory=cat;openCategory(cat);}catch(e){showToast('エラー: '+e.message);}}

function showNicknameModal(){var o=document.createElement('div');o.className='cm-modal-overlay';o.id='nicknameModal';o.onclick=function(e){if(e.target===o)o.remove();};o.innerHTML='<div class="cm-modal"><button class="cm-modal-close" onclick="document.getElementById(\'nicknameModal\').remove()">&times;</button><div class="cm-modal-title">👤 ニックネーム設定</div><p style="font-size:14px;color:var(--gray-600);margin-bottom:14px;">コミュニティで表示される名前を設定してください</p><div class="cm-form-group"><input class="cm-input" id="nicknameInput" placeholder="ニックネーム（1〜20文字）" maxlength="20"></div><button class="cm-btn cm-btn-primary" style="width:100%;" onclick="submitNickname()">設定する</button></div>';document.body.appendChild(o);}
async function submitNickname(){var n=document.getElementById('nicknameInput').value.trim();if(!n){showToast('ニックネームを入力してください');return;}try{await apiFetch('/api/community/me',{method:'POST',body:{nickname:n}});currentUser.nickname=n;updateAuthUI();document.getElementById('nicknameModal').remove();showToast('ニックネームを設定しました');}catch(e){showToast('エラー: '+e.message);}}

document.addEventListener('DOMContentLoaded',async function(){await initUser();var h=location.hash.slice(1);if(['home','articles','forum'].includes(h))switchTab(h);else switchTab('home');});
</script>
